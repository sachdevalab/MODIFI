name: methy2
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  # Core
  - python=3.11
  - pip

  # Scientific stack
  - numpy
  - scipy
  - pandas
  - matplotlib
  - seaborn
  - statsmodels
  - biopython
  - h5py

  # Genomics
  - samtools
  - pysam

  # Nice-to-haves
  - tqdm
  - joblib


