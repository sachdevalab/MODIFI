name: mGlu
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  # Core
  - python=3.11
  - pip

  # Scientific stack
  - numpy
  - scipy
  - pandas
  - matplotlib
  - seaborn
  - statsmodels
  - biopython
  - h5py
  - scikit-learn
  - pyyaml
  - pbmm2
  - pbtk

  # Genomics
  - samtools
  - pysam
  - htslib
  - pbbam

  # Build tools
  - gcc
  - gxx
  - zlib
  - boost-cpp

  # Nice-to-haves
  - tqdm
  - joblib
  - psutil
  - adjusttext
  - regex


