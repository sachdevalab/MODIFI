name: mGlu
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  # Core
  - python=3.9
  - pip

  # Scientific stack
  - numpy=1.22.4
  - scipy
  - pandas
  - matplotlib
  - seaborn
  - statsmodels
  - biopython
  - h5py
  - scikit-learn

  # Genomics
  - samtools
  - pysam
  - htslib
  - pbbam

  # Build tools
  - gcc
  - gxx
  - zlib
  - boost-cpp

  # Nice-to-haves
  - tqdm
  - joblib
  - psutil
  - adjusttext
  - regex


